<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Estadias</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Controle de Estadias</h1>

    <div class="container">

        <form id="formEstadia">

            <h2>Nova Estadia</h2>

            <input type="text" id="placa" placeholder="Placa do veículo" required>

            <input type="number" id="valorHora" placeholder="Valor da hora" required>

            <button type="submit">
                Registrar Entrada
            </button>

        </form>

        <div id="lista"></div>

    </div>

    <script src="estadias.js"></script>

</body>
</html>
